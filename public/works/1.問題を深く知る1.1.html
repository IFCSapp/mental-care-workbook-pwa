<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>困っていることを整理する｜問題を深く知る</title>

  <style>
    /* 変数定義 */
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --blue-50: #eff6ff;
      --blue-200: #bfdbfe;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --red-600: #dc2626;
      --red-700: #b91c1c;
      --emerald-600: #059669;
      --emerald-700: #047857;
    }

    body {
      background-color: var(--slate-100);
      color: var(--slate-800);
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      line-height: 1.5;
      position: relative;
    }

    * { box-sizing: border-box; }

    @media print {
      body {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        background-color: white !important;
      }
      @page { margin: 1.5cm; }
      .print-hidden { display: none !important; }
      .print-block { display: block !important; }
      .app-container { box-shadow: none !important; }
    }

    /* レイアウト・コンテナ */
    .app-wrapper {
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    @media (min-width: 640px) { .app-wrapper { padding: 2rem 1.5rem; } }
    @media (min-width: 1024px) { .app-wrapper { padding: 2rem 2rem; } }

    .coffee-btn-wrap {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 40;
    }
    .coffee-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      background-color: white;
      color: var(--slate-600);
      border-radius: 9999px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      border: 1px solid var(--slate-200);
      cursor: pointer;
      transition: all 0.2s;
    }
    .coffee-btn:hover { background-color: var(--slate-50); color: var(--blue-600); }
    .coffee-btn svg { width: 1.5rem; height: 1.5rem; }

    .app-container {
      max-width: 56rem;
      margin: 0 auto;
      background-color: white;
      border-radius: 0.75rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      overflow: hidden;
      position: relative;
    }

    /* ヘッダー */
    .header {
      background-color: var(--slate-800);
      padding: 1.5rem;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title-wrap { display: flex; align-items: center; gap: 0.75rem; }
    .header-icon { width: 2rem; height: 2rem; display: none; }
    @media (min-width: 640px) { .header-icon { display: block; } }
    .header-title { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em; margin: 0; }
    @media (min-width: 640px) { .header-title { font-size: 1.5rem; } }
    .header-actions { display: flex; gap: 0.75rem; }

    .print-only-header { display: none; padding: 2rem 2rem 0; }
    .print-only-title { font-size: 1.875rem; font-weight: 700; color: var(--slate-800); text-align: center; margin: 0 0 0.5rem 0; }
    @media print { .print-only-header { display: block; } }

    /* ボタン共通 */
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 0.5rem 1rem;
      border-radius: 0.25rem;
      transition: background-color 0.2s, color 0.2s;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    .btn svg { margin-right: 0.5rem; width: 1rem; height: 1rem; }
    .btn-blue { background-color: var(--blue-600); color: white; }
    .btn-blue:hover { background-color: var(--blue-700); }
    .btn-slate { background-color: var(--slate-600); color: white; }
    .btn-slate:hover { background-color: var(--slate-700); }
    .btn-emerald { background-color: var(--emerald-600); color: white; }
    .btn-emerald:hover { background-color: var(--emerald-700); }
    .btn-red { background-color: var(--red-600); color: white; }
    .btn-red:hover { background-color: var(--red-700); }
    .btn-ghost { background-color: var(--slate-100); color: var(--slate-600); }
    .btn-ghost:hover { background-color: var(--slate-200); }
    .btn-outline { background-color: white; color: var(--slate-700); border: 1px solid var(--slate-300); box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); font-size: 0.875rem; }
    .btn-outline:hover { background-color: var(--slate-100); }
    .btn-large {
      padding: 1rem 2rem;
      background-color: var(--blue-600);
      color: white;
      border-radius: 0.5rem;
      font-weight: 700;
      font-size: 1.125rem;
      display: inline-flex;
      align-items: center;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      transition: background-color 0.2s;
    }
    .btn-large:hover { background-color: var(--blue-700); }
    .btn-large svg { margin-right: 0.5rem; width: 1.25rem; height: 1.25rem; }
    .btn-link {
      display: inline-flex;
      align-items: center;
      color: var(--slate-500);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.875rem;
      padding: 0.5rem;
      transition: color 0.2s;
    }
    .btn-link:hover { color: var(--red-600); }
    .btn-link svg { margin-right: 0.25rem; width: 1rem; height: 1rem; }

    /* プログレスバー */
    .progress-wrap { background-color: var(--slate-50); border-bottom: 1px solid var(--slate-200); position: sticky; top: 0; z-index: 10; padding: 0.75rem 1.5rem; }
    .progress-text { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; font-weight: 500; color: var(--slate-600); margin-bottom: 0.25rem; }
    .progress-bg { width: 100%; background-color: var(--slate-200); border-radius: 9999px; height: 0.625rem; }
    .progress-fill { background-color: var(--blue-600); height: 100%; border-radius: 9999px; transition: width 0.5s ease; }

    /* コンテンツエリア */
    .content-pad { padding: 1.5rem; }
    @media (min-width: 640px) { .content-pad { padding: 2rem; } }

    /* 冒頭インフォメーション */
    .info-box { background-color: var(--blue-50); border-left: 4px solid var(--blue-500); padding: 1rem; border-radius: 0.25rem; margin-bottom: 1.5rem; color: var(--slate-700); font-size: 0.875rem; line-height: 1.625; }
    .info-box p { font-weight: 700; margin: 0 0 0.5rem 0; display: flex; align-items: center; font-size: 1rem; }
    .info-box p svg { width: 1.25rem; height: 1.25rem; margin-right: 0.5rem; color: var(--blue-600); }
    .info-box ul { margin: 0 0 0 0.25rem; padding-left: 1rem; }
    .info-box li { margin-bottom: 0.5rem; }

    .info-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-bottom: 2rem; background-color: var(--slate-50); padding: 1rem; border-radius: 0.25rem; border: 1px solid var(--slate-200); }
    @media (min-width: 640px) { .info-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .info-grid { grid-template-columns: repeat(4, 1fr); } }
    .label-title { display: block; font-size: 0.875rem; font-weight: 600; color: var(--slate-700); margin-bottom: 0.25rem; }
    .form-input { width: 100%; padding: 0.5rem; border: 1px solid var(--slate-300); border-radius: 0.25rem; font-size: 1rem; outline: none; }
    .form-input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 2px var(--blue-200); }

    /* セクション共通 */
    .section { background-color: white; border: 1px solid var(--slate-200); border-radius: 0.5rem; box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 1.5rem; }
    .section-btn { width: 100%; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background-color: var(--slate-50); border: none; cursor: pointer; text-align: left; transition: background-color 0.2s; }
    .section-btn:hover { background-color: var(--slate-100); }
    .section-btn h2 { font-size: 1.25rem; font-weight: 700; color: var(--slate-800); margin: 0; }
    .section-btn svg { width: 1.25rem; height: 1.25rem; color: var(--slate-500); }
    .section-body { padding: 1.5rem; border-top: 1px solid var(--slate-100); display: flex; flex-direction: column; gap: 1.5rem; }

    /* 設問コンポーネント */
    .q-label-wrap { margin-bottom: 0.5rem; }
    .q-label { display: block; color: var(--slate-800); font-weight: 600; font-size: 1.125rem; }
    .q-num { margin-right: 0.5rem; color: var(--slate-600); }
    .q-desc { font-size: 0.875rem; color: var(--slate-600); margin: 0.25rem 0 0 0; }

    .form-textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--slate-300); border-radius: 0.25rem; outline: none; resize: vertical; font-size: 1rem; }
    .form-textarea:focus { border-color: var(--blue-500); box-shadow: 0 0 0 2px var(--blue-200); }

    .cb-group { background-color: var(--slate-50); padding: 1rem; border-radius: 0.25rem; border: 1px solid var(--slate-200); }
    .cb-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media (min-width: 640px) { .cb-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 768px) { .cb-grid { grid-template-columns: repeat(3, 1fr); } }
    .cb-item { display: flex; align-items: center; gap: 0.5rem; }
    .cb-input { width: 1rem; height: 1rem; accent-color: var(--blue-600); cursor: pointer; }
    .cb-label { color: var(--slate-700); cursor: pointer; font-size: 1rem; }
    .cb-other { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem; }
    @media (min-width: 640px) { .cb-other { grid-column: span 2; } }
    @media (min-width: 768px) { .cb-other { grid-column: span 3; } }
    .cb-other-label { color: var(--slate-700); white-space: nowrap; font-size: 1rem; }
    .cb-other-input { flex: 1; padding: 0.5rem; border: 1px solid var(--slate-300); border-radius: 0.25rem; outline: none; }
    .cb-other-input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 2px var(--blue-200); }

    .range-wrap { background-color: var(--slate-50); padding: 1rem; border-radius: 0.25rem; border: 1px solid var(--slate-200); }
    .range-input { width: 100%; height: 0.5rem; background-color: var(--slate-300); border-radius: 0.5rem; appearance: none; cursor: pointer; accent-color: var(--blue-600); }
    .range-input::-webkit-slider-thumb { appearance: none; width: 1rem; height: 1rem; background: var(--blue-600); border-radius: 50%; }
    .range-labels { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; color: var(--slate-600); margin-top: 0.5rem; font-weight: 500; }
    .range-val { font-size: 1.125rem; color: var(--blue-700); font-weight: 700; }

    /* テーブル・まとめ欄 */
    .table-desc { font-size: 0.875rem; color: var(--slate-600); margin: 0 0 1rem 0; }
    .table-wrap { overflow-x: auto; }
    .score-table { width: 100%; border-collapse: collapse; border: 1px solid var(--slate-300); }
    .score-table th { background-color: var(--slate-100); border: 1px solid var(--slate-300); padding: 0.75rem; text-align: left; }
    .score-table th.center { text-align: center; width: 25%; }
    .score-table td { border: 1px solid var(--slate-300); padding: 0.75rem; }
    .score-table td.nopad { padding: 0; }
    .td-label { font-weight: 500; }
    .td-number { width: 100%; padding: 0.5rem; border: 1px solid var(--slate-300); border-radius: 0.25rem; text-align: center; outline: none; }
    .td-memo { width: 100%; height: 100%; min-height: 2.5rem; padding: 0.75rem; border: none; outline: none; box-sizing: border-box; }
    .td-memo:focus { box-shadow: inset 0 0 0 2px var(--blue-500); }

    .summary-box { background-color: var(--blue-50); padding: 1.5rem; border-radius: 0.5rem; border: 1px solid var(--blue-200); font-size: 1.125rem; line-height: 1.75; color: var(--slate-800); }
    .inline-input { display: inline-block; border: none; border-bottom: 2px solid var(--blue-400); background: transparent; padding: 0.25rem 0.5rem; margin: 0 0.5rem; width: 12rem; outline: none; transition: all 0.2s; font-size: 1.125rem; }
    @media (min-width: 640px) { .inline-input { width: 16rem; } }
    .inline-input:focus { border-color: var(--blue-600); background-color: white; }
    .summary-box-bottom { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--blue-200); }
    .break-sm { display: block; margin-top: 0.5rem; }
    @media (min-width: 640px) { .break-sm { display: none; } }

    .bottom-actions { display: flex; flex-direction: column; align-items: center; padding-top: 2rem; margin-top: 1rem; border-top: 1px solid var(--slate-200); gap: 1.5rem; }

    /* 結果確認画面 */
    .result-container { display: flex; flex-direction: column; gap: 1.5rem; color: var(--slate-800); }
    .basic-flow { background: #eff6ff; border: 1px solid var(--blue-200); border-radius: 0.75rem; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .basic-flow h2, .result-layer h2 { margin: 0; color: var(--slate-800); font-size: 1.25rem; }
    .basic-flow-actions { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; }
    .detail-toggle-note { color: var(--slate-600); margin: 0; }
    .result-layer { border: 1px solid var(--slate-200); border-radius: 0.75rem; padding: 1.25rem; background: white; }
    .result-layer-view { background: var(--blue-50); border-color: var(--blue-200); }
    .result-layer-next { background: var(--slate-50); }
    .result-layer ul { margin: 0.75rem 0 0; padding-left: 1.25rem; }
    .result-actions { background-color: var(--slate-50); border: 1px solid var(--slate-200); padding: 1rem; border-radius: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .result-actions-title { display: flex; align-items: center; color: var(--slate-700); font-weight: 600; }
    .result-actions-title svg { color: var(--blue-600); margin-right: 0.5rem; width: 1.25rem; height: 1.25rem; }
    .result-btn-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .file-input-label { cursor: pointer; display: inline-flex; }

    .result-info { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; font-size: 0.875rem; }
    @media (min-width: 768px) { .result-info { grid-template-columns: repeat(4, 1fr); } }
    .result-info-item { border-bottom: 1px solid var(--slate-300); padding-bottom: 0.25rem; }
    .result-info-label { color: var(--slate-500); margin-right: 0.5rem; }
    .result-info-val { font-weight: 500; font-size: 1rem; }

    .result-section { margin-bottom: 1.5rem; break-inside: avoid; }
    .result-section-title { font-size: 1.125rem; font-weight: 700; border-bottom: 1px solid var(--slate-300); padding-bottom: 0.25rem; margin: 0 0 0.75rem 0; }
    .result-item { background-color: var(--slate-50); padding: 0.75rem; border-radius: 0.25rem; margin-bottom: 0.75rem; }
    .result-item-q { font-weight: 600; color: var(--slate-700); font-size: 0.875rem; margin: 0 0 0.25rem 0; }
    .result-item-val { white-space: pre-wrap; }
    .result-val-empty { color: var(--slate-400); }
    .result-val-score { font-weight: 700; font-size: 1.125rem; }
    .result-summary-blank { font-weight: 700; border-bottom: 1px solid var(--blue-400); padding: 0 0.25rem; margin: 0 0.25rem; }

    /* サマリー画面のテーブル */
    .result-table { width: 100%; border-collapse: collapse; border: 1px solid var(--slate-300); font-size: 0.875rem; }
    .result-table th { background-color: var(--slate-100); border: 1px solid var(--slate-300); padding: 0.5rem; text-align: left; }
    .result-table th.center { text-align: center; width: 6rem; }
    .result-table td { border: 1px solid var(--slate-300); padding: 0.5rem; }
    .result-table td.label { font-weight: 500; }
    .result-table td.center { text-align: center; font-weight: 700; }

    /* サマリー画面の最後のまとめ */
    .result-summary-box { background-color: var(--blue-50); padding: 1rem; border-radius: 0.5rem; border: 1px solid var(--blue-200); }
    .result-summary-p { font-size: 1.125rem; line-height: 1.75; margin: 0; color: var(--slate-800); }
    .result-summary-p + .result-summary-p { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--blue-200); }

    /* モーダル */
    .modal-overlay { position: fixed; inset: 0; background-color: rgba(15, 23, 42, 0.5); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; backdrop-filter: blur(4px); }
    .modal-content-lg { background-color: white; border-radius: 0.75rem; padding: 2rem; max-width: 28rem; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; overflow: hidden; }
    .modal-content-sm { background-color: white; border-radius: 0.5rem; padding: 1.5rem; max-width: 28rem; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    .modal-top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 0.5rem; background-color: var(--blue-400); }
    .modal-icon-center { width: 3rem; height: 3rem; color: var(--blue-500); margin: 0 auto 1rem; display: block; }
    .modal-title-center { font-size: 1.25rem; font-weight: 700; margin: 0 0 1rem 0; color: var(--slate-800); text-align: center; }
    .modal-text-center { color: var(--slate-600); margin-bottom: 2rem; line-height: 1.625; text-align: center; font-size: 0.875rem; }
    @media (min-width: 640px) { .modal-text-center { font-size: 1rem; } }
    .modal-text-center p { margin: 0 0 0.5rem 0; }
    .modal-actions-center { display: flex; flex-direction: column; gap: 0.75rem; }
    @media (min-width: 640px) { .modal-actions-center { flex-direction: row; justify-content: center; } }
    .btn-modal-dark { padding: 0.75rem 1.5rem; background-color: var(--slate-800); color: white; border-radius: 0.5rem; font-weight: 500; border: none; cursor: pointer; width: 100%; transition: background-color 0.2s; }
    .btn-modal-dark:hover { background-color: var(--slate-700); }
    @media (min-width: 640px) { .btn-modal-dark { width: auto; } }
    .btn-modal-outline { padding: 0.75rem 1.5rem; background-color: white; color: var(--slate-600); border: 1px solid var(--slate-300); border-radius: 0.5rem; font-weight: 500; cursor: pointer; width: 100%; transition: background-color 0.2s; }
    .btn-modal-outline:hover { background-color: var(--slate-50); }
    @media (min-width: 640px) { .btn-modal-outline { width: auto; } }

    .modal-title-left { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.75rem 0; color: var(--slate-800); display: flex; align-items: center; }
    .modal-title-left svg { width: 1.25rem; height: 1.25rem; margin-right: 0.5rem; color: var(--red-600); }
    .modal-text-left { color: var(--slate-600); margin-bottom: 1.5rem; line-height: 1.625; }
    .modal-actions-right { display: flex; justify-content: flex-end; gap: 0.75rem; }

    /* トースト */
    .toast-wrap { position: fixed; top: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 50; width: min(92vw, 34rem); display: flex; justify-content: center; pointer-events: none; }
    .toast-box { background-color: #312e81; color: #f8fafc; border: 1px solid rgba(199, 210, 254, 0.55); padding: 0.75rem 1.25rem; border-radius: 9999px; box-shadow: 0 16px 34px -14px rgba(49,46,129,0.65); font-weight: 500; display: flex; align-items: center; justify-content: center; line-height: 1.5; text-align: center; max-width: 100%; transition: opacity 0.3s; }
    .toast-box svg { width: 1.25rem; height: 1.25rem; margin-right: 0.5rem; flex-shrink: 0; color: #ddd6fe; }
    .toast-box.toast-error { background-color: #fff7ed; color: #7c2d12; border-color: #fed7aa; box-shadow: 0 16px 34px -14px rgba(124,45,18,0.35); }
    .toast-box.toast-error svg { color: #c2410c; }

    /* =========================================================
       全体CSS統一パス: 見た目のみの低リスク調整
       ========================================================= */
    :where(button, .btn, .btn-primary, .btn-secondary, .btn-outline, .btn-dark, .btn-main, .btn-text, .btn-action, .btn-action-primary, .btn-nav-next, .btn-nav-prev, .btn-add, .btn-focus, .btn-reset, .chip, .menu-item, .radio-btn, .mode-btn) {
      min-height: 44px;
      border-radius: 12px;
      font-family: inherit;
      line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }

    :where(button, .btn, .btn-primary, .btn-secondary, .btn-outline, .btn-dark, .btn-main, .btn-text, .btn-action, .btn-action-primary, .btn-nav-next, .btn-nav-prev, .btn-add, .btn-focus, .btn-reset, .chip, .menu-item, .radio-btn, .mode-btn):focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 3px;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.18);
    }

    :where(input[type="text"], input[type="date"], input[type="number"], textarea, select, .form-input, .form-textarea, .input-text) {
      min-height: 44px;
      border-radius: 12px;
      border-color: #cbd5e1;
      background-color: #ffffff;
      line-height: 1.55;
      font-family: inherit;
    }
