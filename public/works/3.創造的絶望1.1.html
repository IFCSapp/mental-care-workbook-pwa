<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>コントロールとの関わりを見る</title>
  <style>
    /* -------------------------------------
       1. Variables & Base Styles
    ------------------------------------- */
    :root {
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --blue-50: #eff6ff;
      --blue-200: #bfdbfe;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
    }

    body {
      background-color: var(--slate-100);
      min-height: 100vh;
      margin: 0;
      padding: 3rem 1rem;
      font-family: sans-serif;
      color: var(--slate-800);
    }

    ::selection {
      background-color: var(--blue-200);
    }

    /* -------------------------------------
       2. Layout & Typography
    ------------------------------------- */
    .app-wrapper {
      max-width: 42rem;
      margin: 0 auto;
    }

    .main-card {
      background-color: #fff;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      padding: 1.5rem;
    }
    @media (min-width: 768px) {
      .main-card {
        padding: 2rem;
      }
    }

    .hidden { display: none !important; }
    .text-center { text-align: center; }
    
    .page-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--slate-800);
      margin: 0 0 0.5rem 0;
    }
    .page-title-sm {
      font-size: 1.25rem;
    }
    .page-desc {
      color: var(--slate-600);
      margin: 0;
    }
    .page-desc-sm {
      font-size: 0.875rem;
      line-height: 1.625;
    }

    /* -------------------------------------
       3. Components
    ------------------------------------- */
    /* Navigation */
    .top-nav {
      margin-bottom: 1rem;
    }
    .btn-back-top {
      display: flex;
      align-items: center;
      color: var(--slate-500);
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .btn-back-top:hover {
      color: var(--blue-700);
    }
    .icon-small {
      width: 1.25rem;
      height: 1.25rem;
      margin-right: 0.25rem;
    }

    /* Containers */
    .section-content {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .box-panel {
      background-color: #fff;
      padding: 1.5rem;
      border-radius: 0.75rem;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      border: 1px solid var(--slate-200);
    }
    .box-panel-padded {
      padding-top: 2.5rem;
      padding-bottom: 2.5rem;
    }
    .box-panel-light {
      background-color: var(--slate-50);
      padding: 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid var(--slate-200);
    }
    .box-panel-inner {
      background-color: #fff;
      padding: 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--slate-200);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      margin-bottom: 1.5rem;
    }

    /* Menu specific */
    .menu-header { margin-bottom: 2rem; text-align: center; }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 768px) {
      .menu-grid { grid-template-columns: repeat(2, 1fr); }
      .col-span-2 { grid-column: span 2 / span 2; }
    }
    .menu-item {
      border: 2px solid var(--slate-200);
      border-radius: 0.75rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      display: block;
      width: 100%;
      background: #fff;
      color: inherit;
      font: inherit;
      text-align: left;
    }
    .menu-item:hover {
      border-color: var(--blue-500);
      background-color: var(--blue-50);
    }
    .menu-item-title {
      font-size: 1.125rem;
      font-weight: bold;
      color: var(--slate-800);
      margin: 0 0 0.5rem 0;
      transition: color 0.2s;
    }
    .menu-item:hover .menu-item-title { color: var(--blue-700); }
    .menu-item-desc { font-size: 0.875rem; color: var(--slate-600); margin: 0; }

    /* Forms */
    .options-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .options-list-spaced { margin-bottom: 1.5rem; }
    .options-list-wide { display: flex; flex-direction: column; gap: 0.75rem; }
    
    .form-label {
      display: flex;
      align-items: center;
      padding: 0.75rem;
      border: 1px solid var(--slate-200);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .form-label:hover { background-color: var(--slate-50); }
    .form-label-start {
      display: flex;
      align-items: flex-start;
      padding: 0.75rem;
      border: 1px solid var(--slate-200);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .form-radio, .form-checkbox {
      width: 1rem;
      height: 1rem;
      accent-color: var(--blue-600);
      border: 1px solid var(--slate-300);
      flex-shrink: 0;
    }
    .form-checkbox {
      margin-top: 0.25rem;
      border-radius: 0.25rem;
    }
    .form-text {
      margin-left: 0.75rem;
      color: var(--slate-700);
    }
    .form-text-block {
      margin-left: 0.75rem;
    }
    .form-text-block span {
      display: block;
      color: var(--slate-700);
    }

    .text-input-wrap { margin-top: 1rem; }
    .text-input-wrap-indent { margin-top: 1rem; padding-left: 2rem; }
    .text-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--slate-300);
      border-radius: 0.5rem;
      outline: none;
      box-sizing: border-box;
      font-size: 1rem;
    }
    .text-input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
    }

    /* Buttons */
    .btn-group { display: flex; gap: 0.75rem; }
    @media (max-width: 639px) {
      .btn-group { flex-direction: column; }
      .btn-group .btn { width: 100%; }
    }
    .btn-group-responsive {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    @media (min-width: 640px) {
      .btn-group-responsive { flex-direction: row; }
    }
    
    .btn {
      font-weight: 600;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
      cursor: pointer;
      border: none;
      text-align: center;
      font-size: 1rem;
    }
    .btn-px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .btn-action-submit { margin-top: 1rem; }
    
    .btn-primary { background-color: var(--blue-600); color: #fff; }
    .btn-primary:hover:not(:disabled) { background-color: var(--blue-700); }
    .btn-primary:disabled { background-color: var(--slate-300); cursor: not-allowed; }
    
    .btn-secondary { background-color: var(--slate-200); color: var(--slate-800); }
    .btn-secondary:hover { background-color: var(--slate-300); }

    .w-1-3 { width: 33.333333%; }
    .w-2-3 { width: 66.666667%; }
    .w-full { width: 100%; }
    .btn-responsive-primary { width: 100%; }
    .btn-responsive-secondary { width: 100%; }
    @media (min-width: 640px) {
      .btn-responsive-primary { width: 66.666667%; }
      .btn-responsive-secondary { width: 33.333333%; }
    }

    /* Info & Texts */
    .safety-notice {
      font-size: 0.75rem;
      color: var(--slate-500);
      margin: 1rem 0 0 0;
      background-color: var(--slate-50);
      padding: 0.5rem;
      border-radius: 0.25rem;
      border: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .safety-icon { width: 1rem; height: 1rem; margin-right: 0.25rem; color: var(--slate-400); }
    
    .question-title { font-weight: 500; color: var(--slate-800); margin: 0 0 1rem 0; }
    .question-title-sm { margin-bottom: 0.5rem; }
    .question-title-divider {
      margin-bottom: 0.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--slate-200);
    }

    .section-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--slate-800);
      margin: 0 0 0.75rem 0;
      border-bottom: 1px solid var(--slate-200);
      padding-bottom: 0.5rem;
    }
    .section-title-mt { margin-top: 1.5rem; }
    
    .text-body { color: var(--slate-700); line-height: 1.625; margin: 0; }
    .text-body-mb { margin-bottom: 1rem; }
    .text-body-strong { font-weight: 500; }
    
    .highlight-box { background-color: var(--blue-50); padding: 1rem; border-radius: 0.5rem; margin-top: 1.5rem; }
    .highlight-text { color: var(--slate-800); font-weight: 500; text-align: center; margin: 0; }
    
    .alert-info {
      background-color: var(--blue-50);
      border-left: 4px solid var(--blue-500);
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--slate-700);
      font-size: 0.875rem;
    }
    .alert-info-last { margin-bottom: 0; }

    .list-bullet { list-style-type: disc; list-style-position: inside; color: var(--slate-700); padding: 0; margin: 0 0 1.5rem 0; }
    .list-bullet li { margin-bottom: 0.75rem; }
    .list-desc { margin-left: 1.25rem; display: inline-block; margin-top: 0.25rem; }
    
    .citation { margin-top: 1.5rem; font-size: 0.75rem; color: var(--slate-500); text-align: right; }
    .citation p { margin: 0; }
    .citation p + p { margin-top: 0.25rem; }
    .citation a { color: var(--blue-500); text-decoration: none; }
    .citation a:hover { text-decoration: underline; }

    /* Exercise Specifics */
    .instruction-text { font-size: 1.25rem; font-weight: 500; color: var(--slate-800); margin: 0 0 1rem 0; line-height: 1.5; }
    .instruction-highlight { font-size: 1.5rem; font-weight: bold; color: var(--blue-700); }
    .instruction-highlight-sm { font-size: 1.125rem; }
    .instruction-sub { color: var(--slate-500); margin: 0; }
    .instruction-sub-detail { margin-top: 0.25rem; }
    
    .slider-val-container { margin-bottom: 2rem; }
    .val-container-spaced { margin-bottom: 1rem; }
    .slider-val { font-size: 3rem; font-weight: bold; color: var(--blue-600); }
    .slider-val-sm { font-size: 2.25rem; font-weight: bold; color: var(--blue-600); }
    .slider-max { color: var(--slate-500); margin-left: 0.5rem; }
    .slider-input {
      width: 100%; height: 0.5rem; background-color: var(--slate-200); border-radius: 0.5rem;
      appearance: none; cursor: pointer; accent-color: var(--blue-600);
    }
    .slider-labels { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--slate-500); margin-top: 0.5rem; }
    
    .dots-item { padding: 0.75rem; background-color: #fff; border: 1px solid var(--slate-200); border-radius: 0.5rem; }
    .dots-title { font-weight: bold; color: var(--blue-700); font-size: 1.125rem; }
    .dots-desc { font-size: 0.875rem; color: var(--slate-600); margin: 0.25rem 0 0 0; }

    /* Timer */
    .timer-container { text-align: center; padding: 2rem 0; }
    .timer-title { font-size: 1.25rem; font-weight: 500; color: var(--slate-800); margin: 0 0 1rem 0; line-height: 1.5; }
    .timer-desc { color: var(--slate-500); margin: 0; }
    .timer-wrapper { position: relative; width: 12rem; height: 12rem; margin: 2rem auto; }
    .timer-svg { width: 100%; height: 100%; }
    .timer-circle-bg { color: var(--slate-100); stroke: currentColor; }
    .timer-circle-fg { color: var(--blue-600); stroke: currentColor; transition: all 1s linear; }
    .timer-text-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .timer-text { font-size: 2.25rem; font-weight: bold; color: var(--slate-800); }
    .timer-finish-text { font-size: 1.125rem; font-weight: 500; color: var(--slate-700); margin: 0; }

    /* -------------------------------------
       4. Animations
    ------------------------------------- */
    .animate-fadeIn { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    /* =========================================================
       全体CSS統一パス: 見た目のみの低リスク調整
       ========================================================= */
    :where(button, .btn, .btn-primary, .btn-secondary, .btn-outline, .btn-dark, .btn-main, .btn-text, .btn-action, .btn-action-primary, .btn-nav-next, .btn-nav-prev, .btn-add, .btn-focus, .btn-reset, .chip, .menu-item, .radio-btn, .mode-btn) {
      min-height: 44px;
      border-radius: 12px;
      font-family: inherit;
      line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }

    :where(button, .btn, .btn-primary, .btn-secondary, .btn-outline, .btn-dark, .btn-main, .btn-text, .btn-action, .btn-action-primary, .btn-nav-next, .btn-nav-prev, .btn-add, .btn-focus, .btn-reset, .chip, .menu-item, .radio-btn, .mode-btn):focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 3px;
      box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.18);
    }

    :where(input[type="text"], input[type="date"], input[type="number"], textarea, select, .form-input, .form-textarea, .input-text) {
      min-height: 44px;
      border-radius: 12px;
      border-color: #cbd5e1;
      background-color: #ffffff;
      line-height: 1.55;
      font-family: inherit;
    }

    :where(input[type="text"], input[type="date"], input[type="number"], textarea, select, .form-input, .form-textarea, .input-text):focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.24);
      outline-offset: 1px;
      border-color: #3b82f6;
    }

    :where(.card, .section, .main-card, .box-panel, .box-panel-light, .info-box, .feedback-box, .form-section, .status, .modal-content, .step-container) {
      border-radius: 16px;
    }

    :where(.info-box, .notice-text, .message-box-primary, .feedback-box) {
      line-height: 1.7;
    }

    :where(.action-buttons, .modal-actions, .footer-actions, .btn-group, .header-actions, .control-actions) {
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    @media (max-width: 640px) {
      html, body { overflow-x: hidden; }
      :where(.app-wrapper, .app-container, #app-container, main, .content-wrapper, .wide-wrapper, .container, .main-card, .card, .section, .panel) { max-width: 100%; }
      :where(.action-buttons, .modal-actions, .footer-actions, .btn-group, .header-actions, .control-actions) { flex-direction: column; align-items: stretch; }
      :where(button, .btn, .btn-primary, .btn-secondary, .btn-outline, .btn-dark, .btn-main, .btn-text, .btn-action, .btn-action-primary, .btn-nav-next, .btn-nav-prev, .btn-add, .btn-focus, .btn-reset, .mode-btn) { width: 100%; justify-content: center; white-space: normal; }
      :where(input, textarea, select) { max-width: 100%; }
    }

    .btn { border-radius: 12px; padding-top: 0.72rem; padding-bottom: 0.72rem; }
    .btn-primary, .btn-secondary { box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08); }
    .box-panel, .box-panel-padded, .box-panel-light, .box-panel-inner, .menu-item { border-radius: 16px; }
    .menu-item { min-height: auto; }
    textarea, input[type="text"], input[type="range"] { border-radius: 12px; }
    @media (max-width: 640px) { .main-card { padding-inline: 1rem; } .btn-group-responsive { flex-direction: column; } }
</style>
  <link rel="stylesheet" href="./accessibility.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- 常に左上に表示されるワーク選択へ戻るボタン -->
    <div id="top-nav" class="top-nav hidden">
      <button onclick="resetToMenu()" class="btn-back-top">
        <svg class="icon-small" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        ワーク選択に戻る
      </button>
    </div>

    <div id="app-container" class="main-card">
      <!-- ここに各画面が動的に描画されます -->
    </div>
  </div>

  <script>
    // アプリケーションの状態管理
    const state = {
      step: 'menu',
      exerciseId: null,
      
      // 1. 感情エクササイズ用
      targetEmotion: '不安',
      customEmotion: '',
      intensity: '',
      experiences: {
        moreAware: false,
        checking: false,
        otherEmotions: false,
        nothing: false,
      },
      
      // 2. 白くまエクササイズ用
      bearCount: '',
      bearActions: {
        distract: false,
        suppress: false,
        giveup: false,
        other: false,
      },

      // 3. 感情スライダー用
      sliderEmotion: '不安',
      customSliderEmotion: '',
      sliderInitial: 5,
      sliderFinal: 5,
      sliderActions: {
        distraction: false,
        optingOut: false,
        thinking: false,
        substances: false,
        other: false,
      },
      sliderShortTerm: '',
      sliderLongTerm: '',

      // 4. 感情コントロール作戦会議用
      strategyTheme: '課題や仕事の前の不安',
      customStrategyTheme: '',
      strategies: {
        rethink: false,
        positive: false,
        prepare: false,
        distract: false,
        analyze: false,
        other: false,
      },
      customStrategy: '',
      strategyFrequency: '',
      problemPersists: '',

      // 5. 天気ワーク用
      weatherType: '曇り（モヤモヤ・気が晴れない）',
      customWeather: '',
      weatherStopResult: '',
      weatherAction: '',
      customWeatherAction: '',

      // 全エクササイズ共通の中立な観察結果
      observedChange: '',

      // 共通タイマー
      timeLeft: 0,
      totalTime: 0,
    };

    let timerInterval = null;

    // --- 安全確保のための共通メッセージ ---
    const safetyNoticeHtml = `
      <p class="safety-notice">
        <svg class="safety-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        しんどくなったら途中でやめて大丈夫です。上の「ワーク選択に戻る」から、ほかの実験を選び直せます。
      </p>
    `;

    // ユーティリティ関数
    function getDisplayEmotion() { return state.targetEmotion === 'その他' ? state.customEmotion : state.targetEmotion; }
    function getDisplaySliderEmotion() { return state.sliderEmotion === 'その他' ? state.customSliderEmotion : state.sliderEmotion; }
    function getDisplayStrategyTheme() { return state.strategyTheme === 'その他' ? state.customStrategyTheme : state.strategyTheme; }
    function getDisplayWeather() { return state.weatherType === 'その他' ? state.customWeather : state.weatherType; }

    // メインの描画ルーティング
    function render() {
      const container = document.getElementById('app-container');
      const topNav = document.getElementById('top-nav');
      container.innerHTML = ''; 

      if (state.step === 'menu') {
        topNav.classList.add('hidden');
      } else {
        topNav.classList.remove('hidden');
      }

      if (state.step === 'menu') {
        container.innerHTML = renderMenu();
        attachMenuListeners();
      } else if (state.step === 'crisis') {
        container.innerHTML = renderCrisisGuide();
        attachCrisisGuideListeners();
      } else if (state.exerciseId === 'emotion') {
        if (state.step === 'select') {
          container.innerHTML = renderSelectEmotion();
          attachSelectEmotionListeners();
        } else if (state.step === 'timer') {
          container.innerHTML = renderTimer();
          if (state.timeLeft === state.totalTime) startTimerProcess();
        } else if (state.step === 'reflection') {
          container.innerHTML = renderReflectionEmotion();
          attachReflectionEmotionListeners();
        } else if (state.step === 'result_summary' || state.step === 'result_detail') {
          container.innerHTML = renderNeutralResultSummary();
          attachNeutralResultListeners();
        }
      } else if (state.exerciseId === 'whitebear') {
        if (state.step === 'instruction') {
          container.innerHTML = renderInstructionBear();
          attachInstructionBearListeners();
        } else if (state.step === 'timer') {
          container.innerHTML = renderTimer();
          if (state.timeLeft === state.totalTime) startTimerProcess();
        } else if (state.step === 'reflection') {
          container.innerHTML = renderReflectionBear();
          attachReflectionBearListeners();
        } else if (state.step === 'result_summary' || state.step === 'result_detail') {
          container.innerHTML = renderNeutralResultSummary();
          attachNeutralResultListeners();
        }
      } else if (state.exerciseId === 'slider') {
        if (state.step === 'select_emotion') {
          container.innerHTML = renderSelectSliderEmotion();
          attachSelectSliderEmotionListeners();
        } else if (state.step === 'slider_initial') {
          container.innerHTML = renderSliderInitial();
          attachSliderInitialListeners();
        } else if (state.step === 'timer') {
          container.innerHTML = renderTimer();
          if (state.timeLeft === state.totalTime) startTimerProcess();
        } else if (state.step === 'reflection') {
          container.innerHTML = renderReflectionSlider();
          attachReflectionSliderListeners();
        } else if (state.step === 'result_summary' || state.step === 'result_detail') {
          container.innerHTML = renderNeutralResultSummary();
          attachNeutralResultListeners();
        }
      } else if (state.exerciseId === 'strategy') {
        if (state.step === 'select_theme') {
          container.innerHTML = renderSelectStrategyTheme();
          attachSelectStrategyThemeListeners();
        } else if (state.step === 'brainstorm') {
          container.innerHTML = renderBrainstormStrategies();
          attachBrainstormStrategiesListeners();
        } else if (state.step === 'reflection') {
          container.innerHTML = renderReflectionStrategy();
          attachReflectionStrategyListeners();
        } else if (state.step === 'result_summary' || state.step === 'result_detail') {
          container.innerHTML = renderNeutralResultSummary();
          attachNeutralResultListeners();
        }
      } else if (state.exerciseId === 'weather') {
        if (state.step === 'select_weather') {
          container.innerHTML = renderSelectWeather();
          attachSelectWeatherListeners();
        } else if (state.step === 'question_stop') {
          container.innerHTML = renderWeatherQuestionStop();
          attachWeatherQuestionStopListeners();
        } else if (state.step === 'question_action') {
          container.innerHTML = renderWeatherQuestionAction();
          attachWeatherQuestionActionListeners();
        } else if (state.step === 'result_summary' || state.step === 'result_detail') {
          container.innerHTML = renderNeutralResultSummary();
          attachNeutralResultListeners();
        }
      }
    }

    function escapeHTML(value) {
      return String(value ?? '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[char]));
    }

    const neutralChangeOptions = [
      { value: 'lower', label: '下がった' },
      { value: 'same', label: 'ほぼ同じ' },
      { value: 'higher', label: '上がった' },
      { value: 'fluctuated', label: '行き来した' },
      { value: 'unknown', label: '分からない' },
    ];

    function getNeutralResponseDetails() {
      if (state.exerciseId === 'emotion') {
        const labels = {
          moreAware: `余計に「${getDisplayEmotion()}」が意識に上がった`,
          checking: `「${getDisplayEmotion()}を感じていないか」を確認した`,
          otherEmotions: '別の感情が出てきた',
          nothing: '特に何も起きなかった',
        };
        const selected = Object.entries(state.experiences).filter(([, value]) => value).map(([key]) => labels[key]);
        return `扱った気持ち: ${escapeHTML(getDisplayEmotion())}<br>もとの回答: ${escapeHTML(state.intensity || '回答なし')}<br>途中で起きたこと: ${escapeHTML(selected.join('、') || '選択なし')}`;
      }
      if (state.exerciseId === 'whitebear') {
        const labels = { distract: '別のことを考えようとした', suppress: '考えを消そうとした', giveup: 'そのままにした', other: 'その他' };
        const selected = Object.entries(state.bearActions).filter(([, value]) => value).map(([key]) => labels[key]);
        return `白くまが浮かんだ回数: ${escapeHTML(state.bearCount || '回答なし')}<br>そのときにしたこと: ${escapeHTML(selected.join('、') || '選択なし')}`;
      }
      if (state.exerciseId === 'slider') {
        const labels = { distraction: '気をそらす・別のことを考える', optingOut: 'その場から離れる・関わるのをやめる', thinking: '理由を分析する・自分に言い聞かせる', substances: '飲食や気晴らしで感覚を変える', other: 'その他' };
        const selected = Object.entries(state.sliderActions).filter(([, value]) => value).map(([key]) => labels[key]);
        return `扱った気持ち: ${escapeHTML(getDisplaySliderEmotion())}<br>数値: ${state.sliderInitial} → ${state.sliderFinal}<br>試したこと: ${escapeHTML(selected.join('、') || '選択なし')}<br>直後: ${escapeHTML(state.sliderShortTerm || '回答なし')}<br>後から: ${escapeHTML(state.sliderLongTerm || '回答なし')}`;
      }
      if (state.exerciseId === 'strategy') {
        const labels = { rethink: '考え直す', positive: 'ポジティブに考える', prepare: '準備を整える', distract: '気をそらす', analyze: '理由を分析する', other: state.customStrategy || 'その他' };
        const selected = Object.entries(state.strategies).filter(([, value]) => value).map(([key]) => labels[key]);
        return `扱った場面: ${escapeHTML(getDisplayStrategyTheme())}<br>試したこと: ${escapeHTML(selected.join('、') || '選択なし')}<br>試した回数: ${escapeHTML(state.strategyFrequency || '回答なし')}<br>今の様子: ${escapeHTML(state.problemPersists || '回答なし')}`;
      }
      const actionText = state.weatherAction === 'その他' ? state.customWeatherAction : state.weatherAction;
      return `使った例え: ${escapeHTML(getDisplayWeather())}<br>止めようとしたとき: ${escapeHTML(state.weatherStopResult || '回答なし')}<br>行動の候補: ${escapeHTML(actionText || '今回は決めない')}`;
    }

    function renderNeutralResultSummary() {
      const options = neutralChangeOptions.map((option) => `
        <label class="form-label">
          <input type="radio" name="neutral-change" value="${option.value}" ${state.observedChange === option.value ? 'checked' : ''} class="neutral-change-radio form-radio">
          <span class="form-text">${option.label}</span>
        </label>
      `).join('');
      const selected = neutralChangeOptions.find((option) => option.value === state.observedChange);

      if (!selected) {
        return `
          <div class="section-content animate-fadeIn">
            <div class="text-center">
              <h2 class="page-title">今回観察した変化</h2>
              <p class="page-desc">今回の体験に最も近いものを1つ選べます。どの結果も同じように扱います。</p>
            </div>
            <div class="box-panel"><div class="options-list">${options}</div></div>
            <button onclick="resetToMenu()" class="btn btn-secondary w-full">結果を作らず、ワーク選択に戻る</button>
          </div>
        `;
      }

      return `
        <div class="section-content animate-fadeIn" data-neutral-summary="${state.exerciseId}">
          <div class="text-center"><h2 class="page-title">今回観察した変化</h2></div>
          <div class="box-panel">
            <section data-feedback-layer="input"><h3 class="section-title">あなたが入力・選択したこと</h3>

            <section data-feedback-layer="view"><h3 class="section-title section-title-mt">一つの見方</h3>
            <p class="text-body">この一回から一般的な結論は出しません。この方法が今回・この場面で何を助け、何を難しくしたかは、別の場面では変わることがあります。</p>
            <details class="citation">
              <summary>このワークの背景</summary>
              <p>思考を抑えようとした後の反跳は、研究では平均的に小〜中程度で、対象や測り方によって差があります。</p>
            </details></section>
            <section data-feedback-layer="next"><h3 class="section-title section-title-mt">次に選べること</h3>
            <p class="text-body">別の体験を試す、同じ画面へ戻る、今は何もしない、支援を求めることを選べます。</p></section>
          </div>
          <div class="btn-group-responsive">
            <button id="neutral-change-again" class="btn btn-secondary btn-responsive-secondary">変化を選び直す</button>
            <button onclick="resetToMenu()" class="btn btn-primary btn-px-6 btn-responsive-primary">ワーク選択に戻る</button>
          </div>
        </div>
      `;
    }

    function attachNeutralResultListeners() {
      document.querySelectorAll('.neutral-change-radio').forEach((input) => {

          state.observedChange = event.target.value;
          render();
        });
      });

    function renderSelectEmotion() {

      const updateButtonState = () => {
        const hasSelection = Object.values(state.strategies).some(v => v);
        const customValid = !state.strategies.other || (state.strategies.other && state.customStrategy.trim() !== '');
        document.getElementById('next-brainstorm-btn').disabled = !(hasSelection && customValid);
      };
      ['rethink', 'positive', 'prepare', 'distract', 'analyze', 'other'].forEach(key => {
        const el = document.getElementById(`chk-strat-${key}`);
        if (el) el.addEventListener('change', (e) => { 
          state.strategies[key] = e.target.checked; 
          if(key === 'other') render();
          else updateButtonState(); 
        });
      });
      const customInput = document.getElementById('custom-strategy-input');
      if (customInput) customInput.addEventListener('input', (e) => { state.customStrategy = e.target.value; updateButtonState(); });
      document.getElementById('next-brainstorm-btn').addEventListener('click', () => { state.step = 'reflection'; render(); });
    }

    function renderReflectionStrategy() {
      const freqHtml = ['1〜5回くらい', '10回くらい', '数え切れないほど（何十回、何百回）'].map(o => `
        <label class="form-label">

      const persistsHtml = ['完全に解決し、二度と現れない', '一時は良くなるが、また戻ってくる', '変わらない、あるいはひどくなっている'].map(o => `
        <label class="form-label">
          <input type="radio" name="problemPersists" value="${o}" ${state.problemPersists === o ? 'checked' : ''} class="strat-persist-radio form-radio"><span class="form-text">${o}</span>
        </label>
      `).join('');

        <div class="section-content animate-fadeIn">

          </div>
          <button id="result-strategy-btn" ${!isReadyToProceed ? 'disabled' : ''} class="btn btn-primary btn-px-6 w-full btn-action-submit">体験を振り返る</button>

    }

    function attachReflectionStrategyListeners() {
      const checkReady = () => document.getElementById('result-strategy-btn').disabled = !(state.strategyFrequency !== '' && state.problemPersists !== '');
      document.querySelectorAll('.strat-freq-radio').forEach(r => r.addEventListener('change', (e) => { state.strategyFrequency = e.target.value; checkReady(); }));
      document.querySelectorAll('.strat-persist-radio').forEach(r => r.addEventListener('change', (e) => { state.problemPersists = e.target.value; checkReady(); }));

    }

    // 感情コントロール作戦会議：第1段階サマリー

        <div class="section-content animate-fadeIn">
          <div class="text-center">
            <h2 class="page-title">今回見えてきたこと</h2>
          </div>
          <div class="box-panel">

    // 感情コントロール作戦会議：第2段階ディテール
    function renderResultDetailStrategy() {
      return `

          <div class="text-center">

          </div>
          <div class="box-panel-light">
            <h3 class="section-title">今回の体験を整理する</h3>

    // ==========================================
    // 5. 感情を天気として扱う
    // ==========================================

    function renderSelectWeather() {
      const weathers = ['曇り（モヤモヤ・気が晴れない）', '雨（悲しみ・落ち込み）', '強風（焦り・混乱）', '雷雨（怒り・強い不安）', 'その他'];

        <label class="form-label">
          <input type="radio" name="weatherType" value="${w}" ${state.weatherType === w ? 'checked' : ''} class="weather-type-radio form-radio">

        </label>
      `).join('');

      const customInputHtml = state.weatherType === 'その他' ? `<div class="text-input-wrap"><input type="text" id="custom-weather-input" placeholder="どのような天気か入力してください" value="${state.customWeather}" class="text-input"></div>` : '';

      return `
        <div class="section-content animate-fadeIn">
          <div class="text-center">
            <h2 class="page-title">感情を「天気」に例える</h2>

            <div class="options-list-wide">${optionsHtml}</div>
            ${customInputHtml}
          </div>
          <div class="btn-group">
            <button onclick="resetToMenu()" class="btn btn-secondary w-1-3">ワーク選択に戻る</button>

      document.getElementById('next-weather-btn').addEventListener('click', () => { state.step = 'question_stop'; render(); });
    }

    function renderWeatherQuestionStop() {
      const optionsHtml = ['どうにもならないし、疲れるだけ', '「なぜ晴れないのか」と余計にイライラする', '天気を気にするあまり、他のことが手につかなくなる'].map(o => `
        <label class="form-label">
          <input type="radio" name="weatherStopResult" value="${o}" ${state.weatherStopResult === o ? 'checked' : ''} class="weather-stop-radio form-radio"><span class="form-text">${o}</span>

        <div class="section-content animate-fadeIn">

          <div class="box-panel"><div class="options-list-wide">${optionsHtml}</div></div>

    function attachWeatherQuestionStopListeners() {
      document.querySelectorAll('.weather-stop-radio').forEach(r => r.addEventListener('change', (e) => { state.weatherStopResult = e.target.value; document.getElementById('next-weather-stop-btn').disabled = false; }));
      document.getElementById('next-weather-stop-btn').addEventListener('click', () => { state.step = 'question_action'; render(); });
    }

    function renderWeatherQuestionAction() {
      const optionsHtml = ['傘をさして（準備をして）、目の前の小さな作業を進める', '雨宿りをして（自分の意志で休んで）、体力を温存する', '長靴を履いて、外の空気を吸う（気分転換をする）', 'その他'].map(o => `
        <label class="form-label">
          <input type="radio" name="weatherAction" value="${o}" ${state.weatherAction === o ? 'checked' : ''} class="weather-action-radio form-radio"><span class="form-text">${o}</span>
        </label>
      `).join('');
      const customInputHtml = state.weatherAction === 'その他' ? `<div class="text-input-wrap-indent"><input type="text" id="custom-action-input" placeholder="具体的な行動を入力してください" value="${state.customWeatherAction}" class="text-input"></div>` : '';
      const isNextDisabled = state.weatherAction === '' || (state.weatherAction === 'その他' && state.customWeatherAction.trim() === '');

        <div class="section-content animate-fadeIn">

            <h2 class="page-title page-title-sm">天気のままで、何をする？</h2>

          </div>
          <div class="box-panel">
            <div class="options-list-wide">${optionsHtml}</div>
            ${customInputHtml}
          </div>
          <button id="result-weather-btn" ${isNextDisabled ? 'disabled' : ''} class="btn btn-primary btn-px-6 w-full btn-action-submit">体験を振り返る</button>

    function attachWeatherQuestionActionListeners() {
      document.querySelectorAll('.weather-action-radio').forEach(r => r.addEventListener('change', (e) => { state.weatherAction = e.target.value; render(); }));

      if (customInput) customInput.addEventListener('input', (e) => { state.customWeatherAction = e.target.value; document.getElementById('result-weather-btn').disabled = state.customWeatherAction.trim() === ''; });
      document.getElementById('result-weather-btn').addEventListener('click', () => { state.step = 'result_summary'; render(); });
    }

    // 天気：第1段階サマリー
    function renderResultSummaryWeather() {
      return `
        <div class="section-content animate-fadeIn">
          <div class="text-center">
            <h2 class="page-title">今回見えてきたこと</h2>
          </div>
          <div class="box-panel">
            <p class="text-body text-body-mb">
              天気そのものは、自分の意志で選びにくいものです。<br>

          </div>

    // 天気：第2段階ディテール
    function renderResultDetailWeather() {
      const actionText = state.weatherAction === 'その他' ? state.customWeatherAction : state.weatherAction;
      return `
        <div class="section-content animate-fadeIn">
          <div class="text-center">
            <h2 class="page-title">もう少し詳しく見る</h2>
          </div>
          <div class="box-panel-light">
            <h3 class="section-title">今回の体験を整理する</h3>
            <div class="text-body-mb">
              <p class="text-body">「${getDisplayWeather()}」を止めようとしたときの回答は「${state.weatherStopResult}」、行動の候補は<strong>「${actionText}」</strong>でした。</p>
            </div>
            
            <h3 class="section-title section-title-mt">この体験で起きやすいこと</h3>
            <ul class="list-bullet">
              <li><strong>感情は「天気」のようなもの</strong><br /><span class="list-desc">天気は私たちの意思に関係なく現れ、そして去っていきます。感情も同じような性質を持ちます。コントロールしにくいものを無理に変えようとすることは、雨に向かって「降るな」と怒鳴り続けるようなもので、ただエネルギーを消耗してしまうことがあります。</span></li>

            </ul>
            <div class="alert-info alert-info-last">気持ちと、それに気づいている視点を分けて表す一つの例えです。安全が脅かされている状況を我慢する意味ではありません。</div>
            <div class="citation">
              <p>出典1: Harris, R. (2009). <em>ACT Made Simple: An Easy-To-Read Primer on Acceptance and Commitment Therapy.</em> New Harbinger Publications. <a href="https://www.newharbinger.com/9781684033010/act-made-simple/" target="_blank" rel="noopener noreferrer">Link</a></p>
              <p>出典2: Hayes, S. C., Strosahl, K. D., & Wilson, K. G. (2011). <em>Acceptance and Commitment Therapy, Second Edition.</em> Guilford Press. <a href="https://www.guilford.com/books/Acceptance-and-Commitment-Therapy/Hayes-Strosahl-Wilson/9781609189624" target="_blank" rel="noopener noreferrer">Link</a></p>

          </div>
        </div>

    // ==========================================
    // 共通タイマー関数
    // ==========================================

    function renderTimer() {
      let instructionText = '';
      if (state.exerciseId === 'whitebear') {
        instructionText = `<span class="instruction-highlight">「絶対に『白くま』を思い浮かべない」</span><br />ようにしてください。`;
      } else if (state.exerciseId === 'slider') {
        instructionText = `<span class="instruction-highlight">「${getDisplaySliderEmotion()}」</span>を、<br />30秒だけ<span class="instruction-highlight">「少し弱めよう」</span>として、変化を観察してください。`;
      } else {
        instructionText = `<span class="instruction-highlight">「${getDisplayEmotion()}」</span><br />を30秒だけ「少し弱めよう」として、変化を観察してください。`;
      }
      
      const progress = ((state.totalTime - state.timeLeft) / state.totalTime) * 100;
      const circumference = 251.2; // 2 * pi * r (r=40)
      const offset = circumference - (circumference * progress) / 100;
      const finishedText = state.timeLeft === 0 ? `<p class="timer-finish-text animate-pulse-slow">終了です。お疲れ様でした。</p>` : '';

      return `
        <div class="timer-container animate-fadeIn">
          <div>
            <h2 class="timer-title">それでは、これから${state.totalTime}秒間、<br />${instructionText}</h2>
            <p class="timer-desc">リラックスして、そのままお過ごしください。</p>
          </div>
          <div class="timer-wrapper">
            <svg class="timer-svg" viewBox="0 0 100 100">
              <circle class="timer-circle-bg" stroke-width="8" cx="50" cy="50" r="40" fill="transparent"></circle>
              <circle id="progress-circle" class="timer-circle-fg" stroke-width="8" stroke-linecap="round" cx="50" cy="50" r="40" fill="transparent" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 50 50)"></circle>
            </svg>
            <div class="timer-text-wrapper"><span id="time-display" class="timer-text">${state.timeLeft}</span></div>
          </div>
          ${finishedText}
        </div>
      `;
    }

    function startTimerProcess() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (state.timeLeft > 0) {
          state.timeLeft -= 1;
          const timeDisplay = document.getElementById('time-display');
          const progressCircle = document.getElementById('progress-circle');
          if (timeDisplay && progressCircle) {
            timeDisplay.textContent = state.timeLeft;
            const progress = ((state.totalTime - state.timeLeft) / state.totalTime) * 100;
            progressCircle.setAttribute('stroke-dashoffset', 251.2 - (251.2 * progress) / 100);
          }
          if (state.timeLeft === 0) {
            clearInterval(timerInterval);
            render();
            setTimeout(() => { state.step = 'reflection'; render(); }, 1500);
          }
        }
      }, 1000);
    }

    // アプリケーション管理
    window.resetToMenu = function() {
      state.step = 'menu';
      state.exerciseId = null;
      
      // 状態の初期化
      state.targetEmotion = '不安'; state.customEmotion = ''; state.intensity = ''; state.experiences = { moreAware: false, checking: false, otherEmotions: false, nothing: false };
      state.bearCount = ''; state.bearActions = { distract: false, suppress: false, giveup: false, other: false };
      state.sliderEmotion = '不安'; state.customSliderEmotion = ''; state.sliderInitial = 5; state.sliderFinal = 5; state.sliderActions = { distraction: false, optingOut: false, thinking: false, substances: false, other: false }; state.sliderShortTerm = ''; state.sliderLongTerm = '';
      state.strategyTheme = '課題や仕事の前の不安'; state.customStrategyTheme = ''; state.strategies = { rethink: false, positive: false, prepare: false, distract: false, analyze: false, other: false }; state.customStrategy = ''; state.strategyFrequency = ''; state.problemPersists = '';
      state.weatherType = '曇り（モヤモヤ・気が晴れない）'; state.customWeather = ''; state.weatherStopResult = ''; state.weatherAction = ''; state.customWeatherAction = '';
      state.observedChange = '';

      if (timerInterval) clearInterval(timerInterval);
      render();
    };

    // 初期描画
    document.addEventListener('DOMContentLoaded', () => { render(); });
</script>
